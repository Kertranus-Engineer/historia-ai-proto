<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Historia IA Prototipo</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <h1>Tu Historia Comienza</h1>

    <!-- INTRO / CONFIG -->
    <div id="intro" class="card">
      <p>Responde breve (o déjalo vacío):</p>

      <input id="lugar" placeholder="Un lugar que te guste (ej: El campo)" />
      <input id="miedo" placeholder="Un miedo (ej: Arañas)" />
      <input id="deseo" placeholder="Algo que deseas (ej: Ser feliz)" />

      <hr style="margin:20px 0; opacity:.2" />

      <select id="genero">
        <option value="supervivencia">Supervivencia</option>
        <option value="horror">Horror</option>
        <option value="ciencia ficcion">Ciencia ficción</option>
        <option value="fantasia">Fantasía</option>
      </select>

      <select id="tono">
        <option value="tenso">Tenso</option>
        <option value="oscuro">Oscuro</option>
        <option value="esperanzador">Esperanzador</option>
        <option value="comico">Cómico</option>
      </select>

      <label for="intensidad">Intensidad (1-10)</label>
      <input type="range" id="intensidad" min="1" max="10" value="6" />

      <div class="row">
        <button id="btnComenzar" class="btn">Comenzar</button>
        <button id="btnContinuar" class="btn secondary">Continuar</button>
        <button id="btnBorrar" class="btn danger">Borrar partida</button>
      </div>

      <p class="hint">Si algo falla abre Console con Ctrl+Shift+I</p>
    </div>

    <!-- JUEGO -->
    <div id="juego" class="card" style="display:none;">
      <img
        id="imagen"
        alt="Escena"
        style="width:100%; max-width:900px; border-radius:12px; margin-bottom:16px;"
      />

      <pre id="texto" class="story"></pre>

      <details style="margin-top:14px; opacity:.9;">
        <summary>Prompt visual (debug)</summary>
        <pre id="promptVisual" class="story" style="white-space:pre-wrap;"></pre>
      </details>

      <details style="margin-top:10px; opacity:.9;">
        <summary>Estado / debug</summary>
        <pre id="debugEstado" class="story" style="white-space:pre-wrap;"></pre>
      </details>

      <div id="opciones" class="options" style="margin-top:16px;"></div>
    </div>

    <!-- sonidos opcionales: si no los tienes, mejor no los cargues -->
    <!--
    <audio id="sfxClick" src="click.mp3" preload="auto"></audio>
    <audio id="sfxDanger" src="danger.mp3" preload="auto"></audio>
    -->
  </div>

  <script type="module" src="./script.js"></script>
</body>
</html>
