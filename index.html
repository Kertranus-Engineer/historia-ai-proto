<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Historia IA Prototipo</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#111;
    color:#eee;
    display:flex;
    justify-content:center;
    padding:30px;
}

.container{
    max-width:700px;
    width:100%;
}

.card{
    background:#1b1b1b;
    padding:25px;
    border-radius:10px;
    margin-top:15px;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#222;
    border:1px solid #444;
    color:#eee;
}

button{
    margin-top:12px;
    padding:10px 16px;
    background:#2d6cdf;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

#opciones button{
    display:block;
    width:100%;
    margin-top:10px;
}

#imagen{
    width:100%;
    border-radius:6px;
    margin-bottom:15px;
}

.hint{
    opacity:.6;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<h1>Tu Historia Comienza</h1>

<div id="intro" class="card">

<p>Responde breve (o déjalo vacío):</p>

<input id="lugar" placeholder="Un lugar que te guste (ej: El campo)">
<input id="miedo" placeholder="Un miedo (ej: Arañas)">
<input id="deseo" placeholder="Algo que deseas (ej: Ser feliz)">

<hr style="margin:20px 0;opacity:.2">

<select id="genero">
<option value="supervivencia">Supervivencia</option>
<option value="horror">Horror</option>
<option value="ciencia ficcion">Ciencia ficción</option>
<option value="fantasia">Fantasía</option>
</select>

<select id="tono">
<option value="tenso">Tenso</option>
<option value="oscuro">Oscuro</option>
<option value="esperanzador">Esperanzador</option>
<option value="comico">Cómico</option>
</select>

<label for="intensidad">Intensidad (1-10)</label>
<input type="range" id="intensidad" min="1" max="10" value="6">

<br>

<button id="btnComenzar">Comenzar</button>
<button id="btnContinuar" style="background:#444">Continuar</button>
<button id="btnReset" style="background:#333">Borrar partida</button>

<p class="hint">
Si algo falla abre Console con Ctrl+Shift+I
</p>

</div>

<div id="juego" class="card" style="display:none;">

<img id="imagen">

<div id="texto"></div>

<div id="opciones"></div>

</div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
